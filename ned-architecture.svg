  <g>
    <rect x="60" y="1120" width="900" height="86" rx="18" fill="#ffffff" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="60" y="1120" width="190" height="86" rx="18" fill="#2f8cff" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="232" y="1120" width="18" height="86" fill="#2f8cff"/>
    <text x="80" y="1156" class="h" font-size="17" font-weight="600" fill="#fff">INTEGRATIONS</text>
    <text x="80" y="1180" font-size="11.5" font-weight="700" fill="#fff">Phase 2 · via OAuth</text>
    <g font-size="13" font-weight="800">
      <rect x="278" y="1140" width="210" height="46" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="383" y="1168" text-anchor="middle">📅 Google / Apple Calendar</text>
      <rect x="506" y="1140" width="200" height="46" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="606" y="1168" text-anchor="middle">🛒 Grocery / shopping</text>
      <rect x="724" y="1140" width="216" height="46" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="832" y="1168" text-anchor="middle">＋ more household services</text>
    </g>
  </g>

  <!-- ===================== RIGHT RAIL: cross-cutting ===================== -->
  <g>
    <rect x="990" y="120" width="190" height="620" rx="18" fill="#1b1726"/>
    <text x="1085" y="156" text-anchor="middle" class="h" font-size="16" font-weight="600" fill="#ffd23f">OBSERVABILITY</text>
    <text x="1085" y="176" text-anchor="middle" class="h" font-size="16" font-weight="600" fill="#ffd23f">&amp; ANALYTICS</text>
    <g font-size="12.5" font-weight="800">
      <rect x="1010" y="200" width="150" height="74" rx="11" fill="#fff" stroke="#ffd23f" stroke-width="2"/>
      <text x="1085" y="232" text-anchor="middle">📈 PostHog</text>
      <text x="1085" y="252" text-anchor="middle" font-size="10.5" font-weight="700">funnels · flags ·</text>
      <text x="1085" y="266" text-anchor="middle" font-size="10.5" font-weight="700">A/B</text>
      <rect x="1010" y="288" width="150" height="74" rx="11" fill="#fff" stroke="#ffd23f" stroke-width="2"/>
      <text x="1085" y="320" text-anchor="middle">🔭 Langfuse</text>
      <text x="1085" y="340" text-anchor="middle" font-size="10.5" font-weight="700">LLM traces ·</text>
      <text x="1085" y="354" text-anchor="middle" font-size="10.5" font-weight="700">cost · tone evals</text>
      <rect x="1010" y="376" width="150" height="64" rx="11" fill="#fff" stroke="#ffd23f" stroke-width="2"/>
      <text x="1085" y="406" text-anchor="middle">🐞 Sentry</text>
      <text x="1085" y="426" text-anchor="middle" font-size="10.5" font-weight="700">app + backend</text>
    </g>
    <line x1="1010" y1="462" x2="1160" y2="462" stroke="#ffd23f" stroke-width="1.5" opacity="0.5"/>
    <text x="1085" y="492" text-anchor="middle" class="h" font-size="15" font-weight="600" fill="#ff7fb0">PRIVACY &amp;</text>
    <text x="1085" y="510" text-anchor="middle" class="h" font-size="15" font-weight="600" fill="#ff7fb0">SECURITY</text>
    <g font-size="11" font-weight="700" fill="#fbf1dd">
      <text x="1085" y="540" text-anchor="middle">UK / EU GDPR</text>
      <text x="1085" y="560" text-anchor="middle">Row-Level Security</text>
      <text x="1085" y="580" text-anchor="middle">Encrypt in transit</text>
      <text x="1085" y="598" text-anchor="middle">+ at rest</text>
      <text x="1085" y="620" text-anchor="middle">Children's-data care</text>
      <text x="1085" y="640" text-anchor="middle">Data minimisation</text>
      <text x="1085" y="660" text-anchor="middle">Right to deletion</text>
      <text x="1085" y="682" text-anchor="middle">Subprocessor DPAs</text>
      <text x="1085" y="702" text-anchor="middle" fill="#16e0c9">No training on</text>
      <text x="1085" y="720" text-anchor="middle" fill="#16e0c9">your data</text>
    </g>
  </g>

  <!-- ===================== DELIVERY / DEVOPS FOOTER ===================== -->
  <g>
    <rect x="60" y="1240" width="1120" height="64" rx="14" fill="#ece6ff" stroke="#7b5be6" stroke-width="2.5"/>
    <text x="84" y="1268" class="h" font-size="15" font-weight="600" fill="#4a3a9e">PLATFORM &amp; DELIVERY</text>
    <text x="84" y="1290" font-size="12.5" font-weight="800" fill="#1b1726">Turborepo monorepo · GitHub Actions CI · EAS mobile builds · Hosting: Render / Fly.io / Railway → AWS / GCP at scale · Secrets: Doppler</text>
  </g>

  <!-- ===================== FLOW ARROWS ===================== -->
  <g stroke="#1b1726" stroke-width="2.5" fill="none">
    <!-- client <-> api -->
    <line x1="500" y1="270" x2="500" y2="318" marker-end="url(#arr)"/>
    <line x1="540" y1="320" x2="540" y2="272" marker-end="url(#arr)"/>
    <!-- api <-> ai -->
    <line x1="500" y1="440" x2="500" y2="488" marker-end="url(#arr)"/>
    <line x1="540" y1="490" x2="540" y2="442" marker-end="url(#arr)"/>
    <!-- ai <-> data -->
    <line x1="500" y1="740" x2="500" y2="788" marker-end="url(#arr)"/>
    <line x1="540" y1="790" x2="540" y2="742" marker-end="url(#arr)"/>
    <!-- jobs -> ai (proactive trigger) curved up -->
    <path d="M275 968 C275 880 250 800 250 742" stroke="#7b5be6" stroke-width="2.5" marker-end="url(#arr)"/>
    <!-- ai/jobs -> delivery -->
    <line x1="490" y1="1030" x2="528" y2="1030" marker-end="url(#arr)"/>
    <!-- delivery -> client (push back to app) -->
    <path d="M745 968 C745 700 980 470 980 260" stroke="#16a0a2" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arr)"/>
    <!-- ai <-> integrations -->
    <line x1="430" y1="1118" x2="430" y2="1092" marker-end="url(#arr)"/>
  </g>
  <text x="760" y="690" font-size="11" font-weight="800" fill="#16a0a2" transform="rotate(-32 760 690)">push delivered to app →</text>

</svg>
