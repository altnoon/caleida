      <rect x="232" y="1034" width="238" height="30" rx="9" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="351" y="1054" text-anchor="middle">"Why you started" re-motivation</text>
    </g>
  </g>

  <!-- ===================== DELIVERY ===================== -->
  <g>
    <rect x="530" y="970" width="430" height="120" rx="18" fill="#ffffff" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="530" y="970" width="150" height="120" rx="18" fill="#16c6c9" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="662" y="970" width="18" height="120" fill="#16c6c9"/>
    <text x="550" y="1008" class="h" font-size="17" font-weight="600">DELIVERY</text>
    <text x="550" y="1032" font-size="12" font-weight="800">Channels</text>
    <text x="550" y="1052" font-size="11.5" font-weight="700">to the dad,</text>
    <text x="550" y="1070" font-size="11.5" font-weight="700">in his moment</text>
    <g font-size="12.5" font-weight="800">
      <rect x="702" y="998" width="238" height="30" rx="9" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
