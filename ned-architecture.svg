<svg viewBox="0 0 1240 1520" xmlns="http://www.w3.org/2000/svg" font-family="'Nunito','Trebuchet MS',sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;family=Nunito:wght@600;700;800&amp;display=swap');
      .h{font-family:'Fredoka','Trebuchet MS',sans-serif;}
      text{fill:#1b1726;}
    </style>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#1b1726"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1240" height="1520" fill="#fbf1dd"/>
  <g fill="#7b5be6" opacity="0.10">
    <circle cx="60" cy="60" r="4"/><circle cx="1180" cy="80" r="4"/><circle cx="1190" cy="1460" r="4"/><circle cx="50" cy="1440" r="4"/>
  </g>

  <!-- title -->
  <text x="60" y="62" class="h" font-size="34" font-weight="700">Ned — System Architecture</text>
  <text x="62" y="90" font-size="16" font-weight="700" fill="#5b5470">Conversational AI agent · proactive nudge engine · household mental-load dashboard · earned memory</text>

  <!-- ===================== CLIENT ===================== -->
  <g>
    <rect x="60" y="120" width="900" height="150" rx="18" fill="#ffffff" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="60" y="120" width="190" height="150" rx="18" fill="#16c6c9" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="232" y="120" width="18" height="150" fill="#16c6c9"/>
    <text x="80" y="158" class="h" font-size="19" font-weight="600">CLIENT</text>
    <text x="80" y="182" font-size="13" font-weight="800">Mobile app</text>
    <text x="80" y="202" font-size="12.5" font-weight="700" fill="#1b1726">React Native</text>
    <text x="80" y="220" font-size="12.5" font-weight="700" fill="#1b1726">+ Expo · TS</text>
    <text x="80" y="246" font-size="11.5" font-weight="700" fill="#0c5f61">TanStack Query</text>
    <text x="80" y="262" font-size="11.5" font-weight="700" fill="#0c5f61">+ Zustand</text>

    <g font-size="13.5" font-weight="800">
      <rect x="278" y="150" width="190" height="44" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="373" y="177" text-anchor="middle">💬 Ned chat</text>
      <rect x="486" y="150" width="200" height="44" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="586" y="177" text-anchor="middle">📊 The Load dashboard</text>
      <rect x="704" y="150" width="236" height="44" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="822" y="177" text-anchor="middle">🧢 Onboarding &amp; You</text>
      <rect x="278" y="206" width="408" height="44" rx="11" fill="#ffe9b0" stroke="#1b1726" stroke-width="2"/>
      <text x="482" y="233" text-anchor="middle">🔔 Push notifications (nudges &amp; celebrations)</text>
      <rect x="704" y="206" width="236" height="44" rx="11" fill="#ffe9b0" stroke="#1b1726" stroke-width="2"/>
      <text x="822" y="233" text-anchor="middle">OTA updates · EAS</text>
    </g>
  </g>

  <!-- ===================== API ===================== -->
  <g>
    <rect x="60" y="320" width="900" height="120" rx="18" fill="#ffffff" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="60" y="320" width="190" height="120" rx="18" fill="#7b5be6" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="232" y="320" width="18" height="120" fill="#7b5be6"/>
    <text x="80" y="358" class="h" font-size="19" font-weight="600" fill="#fff">API</text>
    <text x="80" y="382" font-size="13" font-weight="800" fill="#fff">Backend</text>
    <text x="80" y="402" font-size="12.5" font-weight="700" fill="#fff">NestJS · TS</text>
    <text x="80" y="424" font-size="11.5" font-weight="700" fill="#e7defc">REST / GraphQL</text>

    <g font-size="13.5" font-weight="800">
      <rect x="278" y="348" width="200" height="64" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="378" y="376" text-anchor="middle">🔐 Auth</text>
      <text x="378" y="396" text-anchor="middle" font-size="11.5" font-weight="700">Clerk / Supabase Auth</text>
      <rect x="496" y="348" width="200" height="64" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="596" y="376" text-anchor="middle">Household / kids</text>
      <text x="596" y="396" text-anchor="middle">/ tasks API</text>
      <rect x="714" y="348" width="226" height="64" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="827" y="376" text-anchor="middle">Dashboard / load</text>
      <text x="827" y="396" text-anchor="middle">distribution service</text>
    </g>
  </g>

  <!-- ===================== AI LAYER ===================== -->
  <g>
    <rect x="60" y="490" width="900" height="250" rx="18" fill="#fff3f8" stroke="#ff4f9a" stroke-width="3"/>
    <rect x="60" y="490" width="190" height="250" rx="18" fill="#ff4f9a" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="232" y="490" width="18" height="250" fill="#ff4f9a"/>
    <text x="80" y="528" class="h" font-size="19" font-weight="600" fill="#fff">NED'S</text>
    <text x="80" y="550" class="h" font-size="19" font-weight="600" fill="#fff">BRAIN</text>
    <text x="80" y="582" font-size="12" font-weight="800" fill="#fff">The agent layer</text>
    <text x="80" y="606" font-size="11.5" font-weight="700" fill="#ffe1ee">Voice is the moat —</text>
    <text x="80" y="623" font-size="11.5" font-weight="700" fill="#ffe1ee">tone is enforced</text>
    <text x="80" y="640" font-size="11.5" font-weight="700" fill="#ffe1ee">in the pipeline.</text>

    <g font-size="13.5" font-weight="800">
      <rect x="278" y="520" width="300" height="58" rx="11" fill="#fff" stroke="#1b1726" stroke-width="2"/>
      <text x="428" y="545" text-anchor="middle">🧠 Orchestration</text>
      <text x="428" y="565" text-anchor="middle" font-size="11.5" font-weight="700">Vercel AI SDK (TS) / LangGraph (Py)</text>

      <rect x="596" y="520" width="344" height="58" rx="11" fill="#ffd23f" stroke="#1b1726" stroke-width="2"/>
      <text x="768" y="545" text-anchor="middle">✨ LLM — Anthropic Claude</text>
      <text x="768" y="565" text-anchor="middle" font-size="11.5" font-weight="700">model routing: small=intent · top=voice</text>

      <rect x="278" y="592" width="300" height="58" rx="11" fill="#fff" stroke="#1b1726" stroke-width="2"/>
      <text x="428" y="617" text-anchor="middle">🛠️ Tools (function-calling)</text>
      <text x="428" y="637" text-anchor="middle" font-size="11.5" font-weight="700">book · remind · build list · own task · log win</text>

      <rect x="596" y="592" width="344" height="58" rx="11" fill="#d8fbfb" stroke="#1b1726" stroke-width="2"/>
      <text x="768" y="617" text-anchor="middle">🛡️ Tone guardrail</text>
      <text x="768" y="637" text-anchor="middle" font-size="11.5" font-weight="700">reject/rewrite anything shaming (principle 05)</text>

      <rect x="278" y="664" width="662" height="56" rx="11" fill="#ece6ff" stroke="#7b5be6" stroke-width="2.5"/>
      <text x="609" y="688" text-anchor="middle">⚡ Proactive engine — hybrid: rules decide WHEN to nudge, LLM phrases it in voice</text>
      <text x="609" y="708" text-anchor="middle" font-size="11.5" font-weight="700">"9 days since the shop, mate" · dentist overdue · half-term approaching</text>
    </g>
  </g>

  <!-- ===================== DATA ===================== -->
  <g>
    <rect x="60" y="790" width="900" height="130" rx="18" fill="#ffffff" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="60" y="790" width="190" height="130" rx="18" fill="#ff6b3d" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="232" y="790" width="18" height="130" fill="#ff6b3d"/>
    <text x="80" y="828" class="h" font-size="19" font-weight="600" fill="#fff">DATA &amp;</text>
    <text x="80" y="850" class="h" font-size="19" font-weight="600" fill="#fff">MEMORY</text>
    <text x="80" y="882" font-size="11.5" font-weight="700" fill="#fff">Managed first:</text>
    <text x="80" y="900" font-size="11.5" font-weight="700" fill="#fff">Supabase / Neon</text>

    <g font-size="13.5" font-weight="800">
      <rect x="278" y="820" width="206" height="70" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="381" y="848" text-anchor="middle">🐘 PostgreSQL</text>
      <text x="381" y="870" text-anchor="middle" font-size="11.5" font-weight="700">households · kids ·</text>
      <text x="381" y="886" text-anchor="middle" font-size="11.5" font-weight="700">tasks · load state</text>
      <rect x="502" y="820" width="206" height="70" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="605" y="848" text-anchor="middle">🧬 pgvector</text>
      <text x="605" y="870" text-anchor="middle" font-size="11.5" font-weight="700">semantic memory ·</text>
      <text x="605" y="886" text-anchor="middle" font-size="11.5" font-weight="700">learned patterns</text>
      <rect x="726" y="820" width="214" height="70" rx="11" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="833" y="848" text-anchor="middle">⚡ Redis</text>
      <text x="833" y="870" text-anchor="middle" font-size="11.5" font-weight="700">cache · rate limit ·</text>
      <text x="833" y="886" text-anchor="middle" font-size="11.5" font-weight="700">job queue backing</text>
    </g>
  </g>

  <!-- ===================== JOBS ===================== -->
  <g>
    <rect x="60" y="970" width="430" height="120" rx="18" fill="#ffffff" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="60" y="970" width="150" height="120" rx="18" fill="#ffd23f" stroke="#1b1726" stroke-width="2.5"/>
    <rect x="192" y="970" width="18" height="120" fill="#ffd23f"/>
