      <rect x="702" y="1034" width="116" height="30" rx="9" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="760" y="1054" text-anchor="middle">Email · Resend</text>
      <rect x="826" y="1034" width="114" height="30" rx="9" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
      <text x="883" y="1054" text-anchor="middle">SMS · Twilio</text>
    </g>
  </g>

