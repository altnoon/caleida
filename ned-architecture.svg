    <text x="80" y="1032" font-size="12" font-weight="800">Scheduler</text>
    <text x="80" y="1052" font-size="11.5" font-weight="700">BullMQ →</text>
    <text x="80" y="1070" font-size="11.5" font-weight="700">Temporal</text>
    <g font-size="12.5" font-weight="800">
      <rect x="232" y="998" width="238" height="30" rx="9" fill="#fbf1dd" stroke="#1b1726" stroke-width="2"/>
